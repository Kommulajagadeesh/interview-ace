<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Smart Interview</title>
    <meta name="description" content="AI-powered interview preparation and practice platform" />
    <meta name="author" content="Smart Interview" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Smart Interview" />
    <meta property="og:description" content="AI-powered interview preparation and practice platform" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <script>
      // Polyfill global variables for libraries (like TensorFlow.js) that depend on node globals
      window.global = window;
      window.process = { env: {} };

      // Global error listener to render runtime crashes visibly on screen
      window.addEventListener('error', function(e) {
        var container = document.getElementById('runtime-error-container');
        if (!container) {
          container = document.createElement('div');
          container.id = 'runtime-error-container';
          container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;background:rgba(15,15,20,0.98);color:#ff5555;padding:30px;font-family:monospace;white-space:pre-wrap;overflow:auto;box-sizing:border-box;line-height:1.5;';
          document.body.appendChild(container);
          
          var title = document.createElement('h1');
          title.innerText = '⚠️ Runtime Error Detected';
          title.style.color = '#ff6b6b';
          title.style.marginTop = '0';
          title.style.borderBottom = '2px solid #ff5555';
          title.style.paddingBottom = '10px';
          container.appendChild(title);
        }
        var errorMsg = document.createElement('div');
        errorMsg.style.marginBottom = '20px';
        errorMsg.style.borderBottom = '1px dashed #444';
        errorMsg.style.paddingBottom = '15px';
        errorMsg.innerText = 'Error: ' + e.message + '\nSource: ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\nStack:\n' + (e.error ? e.error.stack : 'N/A');
        container.appendChild(errorMsg);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
